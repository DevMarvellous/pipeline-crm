name: "Build Android APK"

# Wraps the deployed Pipeline PWA (pipeline-crm-flax.vercel.app) as a signed
# Android APK using Bubblewrap/TWA, entirely on GitHub's runners. Produces a
# downloadable .apk attached to a GitHub Release — nothing installed locally.

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node (for Bubblewrap CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Restore signing keystore from secret
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android.keystore

      - name: Pre-configure Bubblewrap's JDK/SDK paths (avoids interactive first-run wizard)
        run: |
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

      - name: Set build version code from run number
        run: |
          node -e "
            const fs = require('fs');
            const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
            m.appVersionCode = ${{ github.run_number }};
            fs.writeFileSync('twa-manifest.json', JSON.stringify(m, null, 2));
          "

      - name: Build signed APK with Bubblewrap
        env:
          KEYSTORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq expect
          expect -f - <<'EXPECT_EOF'
            set timeout 900
            spawn npx --yes @bubblewrap/cli build --skipPwaValidation
            expect -re {\(Y/n\)}
            send "yes\r"
            expect -re {Password for the Key Store:}
            send "$env(KEYSTORE_PW)\r"
            expect -re {Password for the Key:}
            send "$env(KEY_PW)\r"
            expect eof
            catch wait result
            exit [lindex $result 3]
          EXPECT_EOF

      - name: Confirm APK was produced
        run: test -f app-release-signed.apk && echo "APK built successfully"

      - name: Remove keystore from the runner's working copy
        if: always()
        run: rm -f android.keystore

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-apk
          path: app-release-signed.apk
          retention-days: 30

      - name: Publish GitHub Release with the APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Pipeline v1.0.${{ github.run_number }}
          files: app-release-signed.apk
          generate_release_notes: false
