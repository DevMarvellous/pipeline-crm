name: "One-time: Generate Android signing keystore"

# Run this ONCE, only while the repo is PRIVATE. It creates a signing keystore
# and uploads it as a build artifact so you can download it and paste its
# base64 into a repo secret (Settings -> Secrets and variables -> Actions).
# Delete this workflow file (or just never run it again) once that's done.

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: "Password for the keystore file itself (make one up, remember it)"
        required: true
      key_password:
        description: "Password for the signing key inside the keystore (can be the same value)"
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK (provides keytool)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore \
            -alias pipeline \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass '${{ github.event.inputs.keystore_password }}' \
            -keypass '${{ github.event.inputs.key_password }}' \
            -dname "CN=Pipeline, OU=Pipeline, O=Pipeline, L=Lagos, ST=Lagos, C=NG"

      - name: Print SHA-256 fingerprint (needed later for assetlinks.json)
        run: |
          keytool -list -v -keystore android.keystore -alias pipeline \
            -storepass '${{ github.event.inputs.keystore_password }}' | grep "SHA256:"

      - name: Base64-encode keystore
        run: base64 -w 0 android.keystore > android.keystore.b64

      - name: Upload keystore artifact (repo must be PRIVATE right now)
        uses: actions/upload-artifact@v4
        with:
          name: android-keystore
          path: android.keystore.b64
          retention-days: 1
